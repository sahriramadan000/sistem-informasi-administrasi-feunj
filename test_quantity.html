<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Bug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { background: #f5f5f5; padding: 20px; border-radius: 8px; max-width: 400px; }
        input, textarea, select { display: block; margin: 10px 0; padding: 8px; width: 100%; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .debug { background: #fff3cd; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Test Quantity Form Submission</h1>
    
    <div id="debug-output" class="debug">Debug output will appear here...</div>
    
    <form id="test-form">
        <label>Quantity (min 1, max 50):</label>
        <input type="number" id="quantity" name="quantity" value="1" min="1" max="50">
        
        <label>Subject:</label>
        <input type="text" name="subject" value="Test subject">
        
        <button type="submit">Submit Form</button>
    </form>

    <script>
        const debugOutput = document.getElementById('debug-output');
        
        document.getElementById('test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const quantity = document.getElementById('quantity');
            const log = [];
            
            log.push('=== FORM SUBMISSION DEBUG ===');
            log.push(`Quantity .value: "${quantity.value}"`);
            log.push(`Quantity .value type: ${typeof quantity.value}`);
            log.push(`Quantity .value parsed: ${parseInt(quantity.value)}`);
            log.push(`Quantity .getAttribute("value"): "${quantity.getAttribute('value')}"`);
            log.push(`Quantity min: ${quantity.min}`);
            log.push(`Quantity max: ${quantity.max}`);
            log.push(`Quantity validity.valid: ${quantity.validity.valid}`);
            
            const formData = new FormData(this);
            log.push(`FormData.get('quantity'): "${formData.get('quantity')}"`);
            
            log.push('');
            log.push('All FormData:');
            for (let [key, value] of formData.entries()) {
                log.push(`  ${key}: "${value}"`);
            }
            
            // Log to console too
            console.log(log.join('\n'));
            
            // Display debug output
            debugOutput.innerHTML = '<pre>' + log.join('\n') + '</pre>';
        });
    </script>
</body>
</html>
